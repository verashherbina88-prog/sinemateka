<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Синематека</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg: #16140f;
  --surface: #211e17;
  --surface-2: #2a2620;
  --border: #3a352a;
  --red: #b23a2e;
  --red-soft: rgba(178,58,46,0.18);
  --gold: #c9a227;
  --gold-soft: rgba(201,162,39,0.16);
  --ink: #ede6d6;
  --muted: #9a927d;
  --muted-2: #6f6858;
  --green: #6f8f5c;
  --blue: #5b84a3;
  --blue-soft: rgba(91,132,163,0.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
body{-webkit-font-smoothing:antialiased;}
::selection{background:var(--gold-soft);}

.wrap{max-width:920px;margin:0 auto;padding:28px 18px 80px;}

/* Header */
header.top{position:relative;padding:22px 22px 26px;margin-bottom:22px;border:1px solid var(--border);border-radius:4px;
  background:
    repeating-linear-gradient(180deg, transparent 0 22px, var(--surface) 22px 44px),
    var(--surface);
  overflow:hidden;
}
header.top::before, header.top::after{
  content:"";position:absolute;top:0;bottom:0;width:22px;
  background-image: radial-gradient(circle, var(--bg) 5px, transparent 5.5px);
  background-size: 22px 22px; background-position: center;
}
header.top::before{left:0;border-right:1px dashed var(--border);}
header.top::after{right:0;border-left:1px dashed var(--border);}
.title-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:0 30px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;margin:0;color:var(--ink);}
.subtitle{font-size:13px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.stats{display:flex;gap:22px;padding:14px 30px 0;flex-wrap:wrap;}
.profile-btn{margin-left:auto;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:20px;}
.profile-btn:hover{background:var(--surface-2);}
.owner-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
.sync-dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:var(--muted-2);}
.sync-dot.green{background:var(--green);box-shadow:0 0 0 3px rgba(111,143,92,0.18);}
.sync-dot.yellow{background:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,0.2);}
.sync-dot.gray{background:var(--muted-2);}
.bg-progress{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-2);padding:6px 30px 0;}
.new-bin-banner{position:fixed;top:0;left:0;right:0;background:var(--gold);color:#1a1710;padding:11px 18px;font-size:13px;
  display:flex;justify-content:center;align-items:center;gap:14px;z-index:60;font-family:'IBM Plex Mono',monospace;flex-wrap:wrap;}
.new-bin-banner button{background:none;border:1px solid #1a1710;color:#1a1710;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:12px;font-family:'Inter';}
.new-bin-banner button:hover{background:rgba(26,23,16,0.1);}
.stat{font-family:'IBM Plex Mono',monospace;}
.stat b{font-size:20px;color:var(--gold);display:block;font-weight:600;}
.stat span{font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
input[type=text]{
  background:var(--surface);border:1px solid var(--border);color:var(--ink);
  padding:9px 12px;border-radius:3px;font-family:'Inter';font-size:14px;flex:1;min-width:160px;
}
input[type=text]:focus{outline:none;border-color:var(--gold);}
#sortSelect{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  padding:9px 10px;border-radius:3px;font-family:'Inter';font-size:13px;cursor:pointer;
}
#sortSelect:focus{outline:none;border-color:var(--gold);}
#genreFilter{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  padding:8px 10px;border-radius:3px;font-family:'Inter';font-size:13px;cursor:pointer;
}
#genreFilter:focus{outline:none;border-color:var(--gold);}
.badge-genre{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;border:1px solid var(--border);padding:2px 6px;border-radius:3px;}
#bulkBlock{margin-top:2px;}
.chip{
  background:var(--surface);border:1px solid var(--border);color:var(--muted);
  padding:8px 13px;border-radius:20px;font-size:13px;cursor:pointer;user-select:none;
  transition:.15s;white-space:nowrap;
}
.chip:hover{border-color:var(--muted);}
.chip.active{background:var(--red-soft);border-color:var(--red);color:var(--ink);}
.chip.active.status-want{background:var(--gold-soft);border-color:var(--gold);}
.chip.active.status-watching{background:var(--blue-soft);border-color:var(--blue);}
.spacer{flex:1;}
.btn-add{
  background:var(--red);color:#fff;border:none;padding:10px 18px;border-radius:3px;
  font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer;
}
.btn-add:hover{background:#c44536;}

/* List */
.list{display:flex;flex-direction:column;gap:6px;}
.row{
  display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--border);border-left:3px solid var(--muted-2);
  border-radius:3px;padding:11px 14px;
}
.row.status-watched{border-left-color:var(--green);}
.row.status-want{border-left-color:var(--gold);}
.row.status-watching{border-left-color:var(--blue);}
.row-main{flex:1;min-width:0;}
.row-title{font-size:14.5px;font-weight:500;color:var(--ink);}
.row-title .yr{color:var(--muted-2);font-family:'IBM Plex Mono',monospace;font-size:12.5px;margin-left:6px;}
.note-toggle{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:11px;margin-left:7px;padding:2px 5px;border-radius:3px;transition:transform .15s ease;display:inline-block;vertical-align:middle;}
.note-toggle:hover{color:var(--ink);background:var(--surface-2);}
.note-toggle.open{transform:rotate(180deg);}
.row-note{display:none;font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.45;max-width:640px;white-space:pre-wrap;}
.row-note.expanded{display:block;}
.row-tag{display:inline-block;font-size:10.5px;color:var(--muted-2);border:1px solid var(--border);border-radius:10px;padding:1px 8px;margin-top:5px;font-family:'IBM Plex Mono',monospace;}
.badges{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.badge-cat{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-family:'IBM Plex Mono',monospace;border:1px solid var(--border);padding:2px 6px;border-radius:3px;}
.badge-rating{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:var(--gold);min-width:26px;text-align:right;}
.badge-status{font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-family:'IBM Plex Mono',monospace;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.badge-status.st-watched{background:rgba(111,143,92,0.22);color:#9fc086;border:1px solid rgba(111,143,92,0.5);}
.badge-status.st-watching{background:var(--blue-soft);color:#8fb4d1;border:1px solid rgba(91,132,163,0.5);}
.badge-status.st-want{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,162,39,0.5);}
.poster{width:38px;height:54px;flex-shrink:0;border-radius:3px;overflow:hidden;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.poster img{width:100%;height:100%;object-fit:cover;display:block;}
.poster .ph{font-family:'Bebas Neue';font-size:16px;color:var(--muted-2);}
.row-actions{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{
  background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:15px;padding:5px;border-radius:3px;line-height:1;
}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);}
.empty{padding:40px 20px;text-align:center;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;font-size:13px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(10,9,6,0.72);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:22px;width:100%;max-width:440px;max-height:calc(100vh - 32px);overflow-y:auto;}
.modal h2{font-family:'Bebas Neue';font-size:24px;letter-spacing:1px;margin:0 0 16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'IBM Plex Mono',monospace;}
.field input, .field select, .field textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);color:var(--ink);
  padding:9px 10px;border-radius:3px;font-family:'Inter';font-size:14px;
}
.field textarea{resize:vertical;min-height:60px;font-family:'Inter';}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px;}
.btn-primary{background:var(--red);color:#fff;border:none;padding:9px 16px;border-radius:3px;font-weight:600;cursor:pointer;font-family:'Inter';}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);padding:9px 14px;border-radius:3px;cursor:pointer;font-family:'Inter';}
.btn-fetch{background:var(--gold-soft);border:1px solid var(--gold);color:var(--gold);padding:9px 12px;border-radius:3px;cursor:pointer;font-size:12.5px;font-family:'IBM Plex Mono',monospace;}
.btn-fetch:disabled{opacity:.5;cursor:default;}
.fetch-status{font-size:11.5px;color:var(--muted-2);margin-top:6px;font-family:'IBM Plex Mono',monospace;min-height:14px;}
.hint{font-size:11px;color:var(--muted-2);margin-top:14px;line-height:1.5;}
.dup-warning{display:none;background:rgba(178,58,46,0.14);border:1px solid var(--red);color:var(--ink);
  border-radius:3px;padding:9px 11px;font-size:12.5px;margin:-4px 0 12px;line-height:1.5;}
.link-btn{background:none;border:none;color:var(--gold);text-decoration:underline;cursor:pointer;font-size:12.5px;font-family:'Inter';padding:0;}
.star-btn{color:var(--muted-2);font-size:16px;}
.star-btn.active-star{color:var(--gold);}
.badge-fav{color:var(--gold);font-size:14px;flex-shrink:0;}
.chip.fav-chip.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
.filter-block{margin-bottom:10px;}
.filter-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);margin-bottom:6px;padding-left:2px;}

@media (max-width:520px){
  h1{font-size:34px;}
  .stats{gap:14px;}
  header.top::before,header.top::after{display:none;}
  .title-row,.stats{padding:0 8px;}
}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="title-row">
      <h1>СИНЕМАТЕКА</h1>
      <span class="subtitle">личный каталог просмотренного</span>
      <button class="profile-btn" id="syncDotBtn" title="Личный кабинет">
        <span class="owner-label" id="ownerLabel"></span>
        <span class="sync-dot" id="syncDot"></span>
      </button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="bg-progress" id="bgProgress" style="display:none;"></div>
  </header>

  <div class="overlay" id="profileOverlay">
    <div class="modal" style="max-width:380px;">
      <h2>Личный кабинет</h2>
      <div class="field">
        <label>Владелец каталога</label>
        <input type="text" id="ownerInput" placeholder="Твоё имя">
      </div>
      <div class="field">
        <label>Статус синхронизации</label>
        <div id="profileSyncStatus" style="font-size:13px;color:var(--muted);line-height:1.5;"></div>
      </div>
      <div class="field">
        <label>ID бина JSONBin</label>
        <input type="text" id="binIdInput" placeholder="вставь ID, если хочешь подключиться к существующему бину">
      </div>
      <div class="modal-actions">
        <div class="spacer"></div>
        <button class="btn-ghost" id="profileCancelBtn">Закрыть</button>
        <button class="btn-primary" id="profileSaveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Поиск по названию, режиссёру, теме...">
    <select id="sortSelect">
      <option value="title-asc">А → Я</option>
      <option value="title-desc">Я → А</option>
      <option value="rating-desc">Оценка: сначала высокие</option>
      <option value="rating-asc">Оценка: сначала низкие</option>
      <option value="year-desc">Год: сначала новые</option>
      <option value="year-asc">Год: сначала старые</option>
    </select>
    <button class="btn-add" id="addBtn">+ Добавить</button>
  </div>
  <div class="filter-block">
    <div class="filter-label">Категория</div>
    <div class="controls" id="filterCatRow"></div>
  </div>
  <div class="filter-block">
    <div class="filter-label">Статус</div>
    <div class="controls" id="filterStatusRow"></div>
  </div>
  <div class="filter-block">
    <div class="controls" id="filterFavRow"></div>
    <select id="genreFilter" style="margin-top:8px;">
      <option value="all">Все жанры</option>
    </select>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Новая запись</h2>
    <div class="field">
      <label>Название</label>
      <input type="text" id="f_title" placeholder="Название фильма/сериала">
    </div>
    <div class="dup-warning" id="dupWarning"></div>
    <div class="row2">
      <div class="field">
        <label>Год</label>
        <input type="text" id="f_year" placeholder="2024">
      </div>
      <div class="field">
        <label>Категория</label>
        <select id="f_category">
          <option value="movie">Фильм</option>
          <option value="series">Сериал</option>
          <option value="cartoon">Мультфильм</option>
          <option value="anime">Аниме</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Статус</label>
        <select id="f_status">
          <option value="watched">Посмотрено</option>
          <option value="watching">Смотрю сейчас</option>
          <option value="want">Хочу посмотреть</option>
        </select>
      </div>
      <div class="field">
        <label>Оценка (0–10)</label>
        <input type="text" id="f_rating" placeholder="8.5">
      </div>
    </div>
    <div class="field">
      <label style="display:inline;">Избранное</label>
      <div>
        <button type="button" class="star-btn" id="f_favorite" style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px 0;">☆</button>
      </div>
    </div>
    <div class="field">
      <label>Заметка / впечатление</label>
      <textarea id="f_note" placeholder="Твои мысли о фильме..."></textarea>
    </div>
    <div class="field">
      <label>Тег (режиссёр, франшиза, тема)</label>
      <input type="text" id="f_tag" placeholder="необязательно">
    </div>
    <div class="field">
      <label>Жанр</label>
      <input type="text" id="f_genre" placeholder="впиши сам — например, драма, триллер">
    </div>

    <div class="field" id="posterField" style="display:none;">
      <label>Обложка</label>
      <div class="poster" id="posterPreview" style="width:64px;height:90px;"></div>
    </div>

    <button class="btn-fetch" id="fetchBtn" style="width:100%;margin-top:4px;">⌕ Найти в Википедии: обложка, год, описание</button>
    <div class="fetch-status" id="fetchStatus"></div>

    <div class="modal-actions">
      <button class="btn-ghost" id="deleteBtn" style="display:none;color:var(--red);border-color:var(--red);">Удалить</button>
      <div class="spacer"></div>
      <button class="btn-ghost" id="cancelBtn">Отмена</button>
      <button class="btn-primary" id="saveBtn">Сохранить</button>
    </div>
    <div class="hint">Поиск идёт по Википедии: подставляет обложку, год и короткое описание — при желании отредактируй перед сохранением. Если статья не находится, попробуй уточнить название или год.</div>
  </div>
</div>

  el.innerHTML = `Создан новый бин синхронизации — это значит, устройство пишет в отдельное хранилище. ID: <b>${id}</b> <button id="copyBinIdBtn">Скопировать ID</button> <button id="closeBinBannerBtn">Закрыть</button>`;
  el.style.display = 'flex';
  document.getElementById('copyBinIdBtn').addEventListener('click', ()=>{
    if(navigator.clipboard) navigator.clipboard.writeText(id).catch(()=>{});
  });

function updateSyncDot(){

  }else if(CONFIG.jsonbinApiKey){

async function backendGet(){
  if(CONFIG.jsonbinApiKey){
    try{
      if(!CONFIG.jsonbinBinId){
        try{ const saved = localStorage.getItem('sinemateka_binid'); if(saved) CONFIG.jsonbinBinId = saved; }catch(e){}
      }
      if(!CONFIG.jsonbinBinId) return null;
      const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbinBinId}/latest`, {
        headers: {'X-Master-Key': CONFIG.jsonbinApiKey}
      });
      if(!res.ok) return null;
      const data = await res.json();
      return data.record;
    }catch(e){ console.error('jsonbin get error', e); return null; }
  }
  if(typeof window.storage !== 'undefined'){
    try{
      const res = await window.storage.get('app_state', false);
      return JSON.parse(res.value);
    }catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem('sinemateka_state');
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

async function backendSet(stateObj){
  if(CONFIG.jsonbinApiKey){
    try{
      if(!CONFIG.jsonbinBinId){
        const res = await fetch('https://api.jsonbin.io/v3/b', {
          method: 'POST',
          headers: {'Content-Type':'application/json','X-Master-Key':CONFIG.jsonbinApiKey,'X-Bin-Name':'sinemateka'},
          body: JSON.stringify(stateObj)
        });
        if(res.ok){
          const data = await res.json();
          CONFIG.jsonbinBinId = data.metadata.id;
          try{ localStorage.setItem('sinemateka_binid', CONFIG.jsonbinBinId); }catch(e){}
          showNewBinBanner(CONFIG.jsonbinBinId);
          updateSyncDot();
        }
        return;
      }
      await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbinBinId}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key':CONFIG.jsonbinApiKey},
        body: JSON.stringify(stateObj)
      });
    }catch(e){ console.error('jsonbin set error', e); }
    return;
  }
  if(typeof window.storage !== 'undefined'){
    try{ await window.storage.set('app_state', JSON.stringify(stateObj), false); }catch(e){ console.error(e); }
    return;
  }
  try{ localStorage.setItem('sinemateka_state', JSON.stringify(stateObj)); }catch(e){ console.error(e); }
}

async function persist(){
  await backendSet({catalog, flags, owner});
}

async function loadCatalog(){
  updateSyncDot();
  const state = await backendGet();
  if(state && Array.isArray(state.catalog)){
    catalog = state.catalog;
    flags = state.flags || {};
    owner = state.owner || '';
  }else{
    catalog = SEED.map(it => ({...it, id: uid()}));
    flags = {};
    owner = '';
    await persist();
  }
  updateSyncDot();
  await mergeAnimeSeed();
  await migrateCatalog();
  await cleanupPhotoBlob();
  render();
  populateGenreFilter();
  autoEnrichBackground();
}

async function cleanupPhotoBlob(){
  if(flags.photo_cleanup_v1) return;
  const before = catalog.length;
  catalog = catalog.filter(it => !(it.tag==='Фотография' && /^Фотография/.test(it.title)));
  flags.photo_cleanup_v1 = true;
  await persist();
}

async function mergeAnimeSeed(){
  if(flags.anime_merged_v1) return;
  catalog = catalog.concat(ANIME_SEED.map(it => ({...it, id: uid()})));
  flags.anime_merged_v1 = true;
  await persist();
}

async function migrateCatalog(){
  let changed = false;
  catalog.forEach(it=>{
    if(it.year===undefined || it.year===null){ it.year=''; changed=true; }
    if(!it.year){
      const m = it.title.match(/\s*\((\d{4}(?:[–-]\d{4})?)\)\s*/);
      if(m){
        it.year = m[1];
        it.title = (it.title.slice(0,m.index)+it.title.slice(m.index+m[0].length)).trim();
        changed = true;
      }
    }
  });
  if(changed) await persist();
}

const CAT_LABEL = {movie:'Фильм', series:'Сериал', cartoon:'Мульт', anime:'Аниме'};
const STATUS_LABEL = {watched:'Просмотрено', watching:'Смотрю', want:'В планах'};
let sortMode = 'title-asc';

function computeStats(){
  const watched = catalog.filter(i=>i.status==='watched');
  const watching = catalog.filter(i=>i.status==='watching');
  const want = catalog.filter(i=>i.status==='want');
  const rated = watched.filter(i=>i.rating!==null && i.rating!==undefined && i.rating!=='');
  const avg = rated.length ? (rated.reduce((a,b)=>a+parseFloat(b.rating),0)/rated.length).toFixed(1) : '—';
  return {watchedN:watched.length, watchingN:watching.length, wantN:want.length, avg};
}

function renderStats(){
  const s = computeStats();
  document.getElementById('stats').innerHTML = `
    <div class="stat"><b>${s.watchedN}</b><span>Посмотрено</span></div>
    <div class="stat"><b>${s.watchingN}</b><span>Смотрю сейчас</span></div>
    <div class="stat"><b>${s.wantN}</b><span>В планах</span></div>
    <div class="stat"><b>${s.avg}</b><span>Средняя оценка</span></div>
  `;
}

function renderFilters(){
  const cats = [['all','Всё'],['movie','Фильмы'],['series','Сериалы'],['cartoon','Мультфильмы'],['anime','Аниме']];
  const statuses = [['all','Любой статус'],['watched','Посмотрено'],['watching','Смотрю сейчас'],['want','Хочу посмотреть']];
  let catHtml = '';
  cats.forEach(([v,label])=>{
    catHtml += `<div class="chip ${activeCategory===v?'active':''}" data-kind="cat" data-val="${v}">${label}</div>`;
  });
  let statusHtml = '';
  statuses.forEach(([v,label])=>{
    const cls = v==='want' ? ' status-want' : (v==='watching' ? ' status-watching' : '');
    statusHtml += `<div class="chip ${activeStatus===v?'active'+cls:''}" data-kind="status" data-val="${v}">${label}</div>`;
  });
  const favHtml = `<div class="chip fav-chip ${favoriteOnly?'active':''}" data-kind="fav" data-val="1">★ Избранное</div>`;
  document.getElementById('filterCatRow').innerHTML = catHtml;
  document.getElementById('filterStatusRow').innerHTML = statusHtml;
  document.getElementById('filterFavRow').innerHTML = favHtml;
  document.querySelectorAll('#filterCatRow .chip, #filterStatusRow .chip, #filterFavRow .chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(el.dataset.kind==='cat') activeCategory = el.dataset.val;
      else if(el.dataset.kind==='status') activeStatus = el.dataset.val;
      else if(el.dataset.kind==='fav') favoriteOnly = !favoriteOnly;
      renderFilters();
      renderList();
    });
  });
}

function renderList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let items = catalog.filter(it=>{
    if(activeCategory!=='all' && it.category!==activeCategory) return false;
    if(activeStatus!=='all' && it.status!==activeStatus) return false;
    if(favoriteOnly && !it.favorite) return false;
    if(genreFilterValue!=='all' && !(it.genre||'').split(',').map(g=>g.trim()).includes(genreFilterValue)) return false;
    if(q){
      const hay = (it.title+' '+(it.note||'')+' '+(it.tag||'')+' '+(it.year||'')+' '+(it.genre||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  items = items.slice().sort((a,b)=>{
    if(sortMode==='title-asc') return a.title.localeCompare(b.title,'ru');
    if(sortMode==='title-desc') return b.title.localeCompare(a.title,'ru');
    if(sortMode==='year-desc' || sortMode==='year-asc'){
      const ya = getYear(a), yb = getYear(b);
      if(ya!==null && yb===null) return -1;
      if(ya===null && yb!==null) return 1;
      if(ya===null && yb===null) return a.title.localeCompare(b.title,'ru');
      return (sortMode==='year-desc' ? yb-ya : ya-yb) || a.title.localeCompare(b.title,'ru');
    }
    const hasA = a.rating!==null && a.rating!==undefined && a.rating!=='';
    const hasB = b.rating!==null && b.rating!==undefined && b.rating!=='';
    if(hasA && !hasB) return -1;
    if(!hasA && hasB) return 1;
    if(!hasA && !hasB) return a.title.localeCompare(b.title,'ru');
    const ra = parseFloat(a.rating), rb = parseFloat(b.rating);
    if(sortMode==='rating-desc') return rb-ra || a.title.localeCompare(b.title,'ru');
    if(sortMode==='rating-asc') return ra-rb || a.title.localeCompare(b.title,'ru');
    return 0;
  });
  const listEl = document.getElementById('list');
  if(items.length===0){
    listEl.innerHTML = `<div class="empty">Ничего не найдено. Измени фильтр или добавь запись.</div>`;
    renderStats();
    return;
  }
  listEl.innerHTML = items.map(it=>{
    const ratingHtml = (it.rating!==null && it.rating!==undefined && it.rating!=='') ? `<div class="badge-rating">${it.rating}</div>` : `<div class="badge-rating" style="color:var(--muted-2)">—</div>`;
    let titleClean = it.title;
    const noteHtml = it.note ? `<div class="row-note" id="note-${it.id}">${escapeHtml(it.note)}</div>` : '';
    const noteToggle = it.note ? `<button class="note-toggle" data-note-id="${it.id}" title="Показать описание">▾</button>` : '';
    const tagHtml = it.tag ? `<div class="row-tag">${escapeHtml(it.tag)}</div>` : '';
    const posterHtml = it.poster
      ? `<div class="poster"><img src="${escapeHtml(it.poster)}" alt="" loading="lazy"></div>`
      : `<div class="poster"><span class="ph">${escapeHtml((it.title[0]||'?').toUpperCase())}</span></div>`;
    const statusBadge = `<div class="badge-status st-${it.status}">${STATUS_LABEL[it.status]||it.status}</div>`;
    const favHtml = it.favorite ? `<div class="badge-fav" title="В избранном">★</div>` : '';
    const yearHtml = it.year ? `<span class="yr">${escapeHtml(it.year)}</span>` : '';
    const genreHtml = it.genre ? `<div class="badge-genre">${escapeHtml(it.genre)}</div>` : '';
    return `<div class="row status-${it.status}" data-id="${it.id}">
      ${posterHtml}
      <div class="row-main">
        <div class="row-title">${escapeHtml(titleClean)}${yearHtml}${noteToggle}</div>
        ${noteHtml}
        ${tagHtml}
      </div>
      <div class="badges">
        ${favHtml}
        <div class="badge-cat">${CAT_LABEL[it.category]||it.category}</div>
        ${genreHtml}
        ${statusBadge}
        ${ratingHtml}
      </div>
      <div class="row-actions">
        <button class="icon-btn star-btn ${it.favorite?'active-star':''}" title="В избранное" data-star="${it.id}">${it.favorite?'★':'☆'}</button>
        <button class="icon-btn edit-btn" title="Редактировать">✎</button>
      </div>
    </div>`;
  }).join('');
  listEl.querySelectorAll('.star-btn').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const it = catalog.find(x=>x.id===el.dataset.star);
      if(it){ it.favorite = !it.favorite; persist(); renderList(); }
    });
  });
  listEl.querySelectorAll('.note-toggle').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const noteEl = document.getElementById('note-'+btn.dataset.noteId);
      if(!noteEl) return;
      const expanded = noteEl.classList.toggle('expanded');
      btn.classList.toggle('open', expanded);
    });
  });
  listEl.querySelectorAll('.row').forEach(el=>{
    el.addEventListener('click', ()=> openModal(el.dataset.id));
  });
  renderStats();
}

function getYear(it){
  return it.year ? parseInt(it.year,10) : null;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  renderFilters();
  renderList();
}

let currentPoster = '';
let currentFavorite = false;

function updatePosterPreview(){
  const field = document.getElementById('posterField');
  const prev = document.getElementById('posterPreview');
  if(currentPoster){
    field.style.display = 'block';
    prev.innerHTML = `<img src="${currentPoster}" alt="">`;
  }else{
    field.style.display = 'none';
    prev.innerHTML = '';
  }
}

function updateFavoriteBtn(){
  const btn = document.getElementById('f_favorite');
  btn.textContent = currentFavorite ? '★' : '☆';
  btn.style.color = currentFavorite ? 'var(--gold)' : 'var(--muted-2)';
}

function normTitle(t){
  return (t||'').toLowerCase().replace(/[«»"'.,!?:;]/g,'').replace(/\s+/g,' ').trim();
}

function findDuplicate(title, year, excludeId){
  const nt = normTitle(title);
  if(!nt) return null;
  return catalog.find(it => it.id!==excludeId && normTitle(it.title)===nt && (it.year||'')===(year||'')) || null;
}

function hideDupWarning(){
  const w = document.getElementById('dupWarning');
  w.style.display = 'none';
  w.innerHTML = '';
}

function openModal(id){
  editingId = id || null;
  document.getElementById('fetchStatus').textContent = '';
  hideDupWarning();
  const it = id ? catalog.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = it ? 'Редактировать' : 'Новая запись';
  document.getElementById('f_title').value = it ? it.title : '';
  document.getElementById('f_year').value = it ? (it.year||'') : '';
  document.getElementById('f_category').value = it ? it.category : 'movie';
  document.getElementById('f_status').value = it ? it.status : 'watched';
  document.getElementById('f_rating').value = it && it.rating!==null && it.rating!==undefined ? it.rating : '';
  document.getElementById('f_note').value = it ? (it.note||'') : '';
  document.getElementById('f_tag').value = it ? (it.tag||'') : '';
  document.getElementById('f_genre').value = it ? (it.genre||'') : '';
  document.getElementById('deleteBtn').style.display = it ? 'inline-block' : 'none';
  currentPoster = it && it.poster ? it.poster : '';
  currentFavorite = !!(it && it.favorite);
  updatePosterPreview();
  updateFavoriteBtn();
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
}

async function saveItem(){
  const title = document.getElementById('f_title').value.trim();
  if(!title) return;
  const year = document.getElementById('f_year').value.trim();
  const category = document.getElementById('f_category').value;
  const status = document.getElementById('f_status').value;
  const ratingRaw = document.getElementById('f_rating').value.trim();
  const rating = ratingRaw ? parseFloat(ratingRaw.replace(',','.')) : null;
  const note = document.getElementById('f_note').value.trim();
  const tag = document.getElementById('f_tag').value.trim();
  const genre = document.getElementById('f_genre').value.trim();
  const poster = currentPoster || '';
  const favorite = currentFavorite;

  const dup = findDuplicate(title, year, editingId);
  if(dup){
    const w = document.getElementById('dupWarning');
    w.style.display = 'block';
    const dupLabel = dup.year ? `${dup.title} (${dup.year})` : dup.title;
    w.innerHTML = `Уже есть в каталоге: <b>${escapeHtml(dupLabel)}</b> — <button type="button" class="link-btn" id="dupJumpBtn">открыть эту запись</button>`;
    document.getElementById('dupJumpBtn').addEventListener('click', ()=> openModal(dup.id));
    return;
  }

  if(editingId){
    const it = catalog.find(x=>x.id===editingId);
    Object.assign(it, {title, year, category, status, rating, note, tag, genre, poster, favorite});
  }else{
    catalog.unshift({id: uid(), title, year, category, status, rating, note, tag, genre, poster, favorite});
  }
  await persist();
  closeModal();
  render();
  populateGenreFilter();
}

async function deleteItem(){
  if(!editingId) return;
  catalog = catalog.filter(x=>x.id!==editingId);
  await persist();
  closeModal();
  render();
}

const CAT_TERM = {movie:'фильм', series:'сериал', cartoon:'мультфильм', anime:'аниме'};

async function fetchWikiInfo(title, year, category){
  const query = [title, year, CAT_TERM[category]].filter(Boolean).join(' ');
  const searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
  const sres = await fetch(searchUrl);
  if(!sres.ok) throw new Error('search http '+sres.status);
  const sdata = await sres.json();
  const hit = sdata && sdata.query && sdata.query.search && sdata.query.search[0];
  if(!hit) throw new Error('no search hit');
  const pageTitle = hit.title;

  const sumUrl = `https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle.replace(/ /g,'_'))}`;
  const pres = await fetch(sumUrl);
  if(!pres.ok) throw new Error('summary http '+pres.status);
  const pdata = await pres.json();

  return {pageTitle, pdata};
}

function buildWikiNote(pageTitle, pdata){
  const noteLines = [];
  if(pdata.description) noteLines.push(pdata.description.charAt(0).toUpperCase()+pdata.description.slice(1));
  if(pdata.extract){
    const ex = pdata.extract.length > 260 ? pdata.extract.slice(0,260).trim()+'…' : pdata.extract;
    noteLines.push(ex);
  }
  noteLines.push('Источник: Википедия — ' + pageTitle);
  return noteLines.join('\n');
}

async function fetchMovieInfo(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){
    document.getElementById('fetchStatus').textContent = 'Сначала введи название.';
    return;
  }
  const btn = document.getElementById('fetchBtn');
  const statusEl = document.getElementById('fetchStatus');
  const category = document.getElementById('f_category').value;
  const yearHint = document.getElementById('f_year').value.trim();
  btn.disabled = true;
  statusEl.textContent = 'Ищу статью в Википедии...';
  try{
    const {pageTitle, pdata} = await fetchWikiInfo(title, yearHint, category);

    const yearSrc = (pdata.description||'') + ' ' + (pdata.extract||'');
    const yearMatch = yearSrc.match(/\b(19|20)\d{2}\b/);
    if(yearMatch && !yearHint) document.getElementById('f_year').value = yearMatch[0];

    if(pdata.thumbnail && pdata.thumbnail.source){
      currentPoster = pdata.thumbnail.source;
    }
    updatePosterPreview();

    const noteLine = buildWikiNote(pageTitle, pdata);
    const curNote = document.getElementById('f_note').value.trim();
    document.getElementById('f_note').value = curNote ? (curNote+'\n\n'+noteLine) : noteLine;

    statusEl.textContent = currentPoster ? 'Готово — обложка и описание подставлены.' : 'Нашла статью, но без обложки. Описание добавлено.';
  }catch(e){
    console.error('fetchMovieInfo error:', e);
    statusEl.textContent = 'Не нашла статью в Википедии для "'+title+'". Попробуй уточнить название/год или заполни вручную.';
  }finally{
    btn.disabled = false;
  }
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Тихая фоновая подгрузка обложек и описаний — без кнопок и без участия пользователя.
// Обрабатывает только записи без обложки, сохраняет по ходу, продолжает с того же места
// при следующем открытии сайта, если не успела закончить за один раз.
async function autoEnrichBackground(){
  const targets = catalog.filter(it => !it.poster && !it._enrichFailed);
  if(targets.length===0) return;
  const prog = document.getElementById('bgProgress');
  prog.style.display = 'block';
  let done = 0;
  for(const it of targets){
    done++;
    prog.textContent = `фоновая загрузка обложек: ${done}/${targets.length}`;
    try{
      const {pageTitle, pdata} = await fetchWikiInfo(it.title, it.year, it.category);
      if(pdata.thumbnail && pdata.thumbnail.source) it.poster = pdata.thumbnail.source;
      if(!it.note || !it.note.includes('Источник: Википедия')){
        const noteLine = buildWikiNote(pageTitle, pdata);
        it.note = it.note ? (it.note+'\n\n'+noteLine) : noteLine;
      }
    }catch(e){
      it._enrichFailed = true; // не найдено — не пытаемся снова каждую сессию
    }
    if(done % 10 === 0){ await persist(); renderList(); }
    await sleep(300);
  }
  await persist();
  renderList();
  prog.style.display = 'none';
}

function populateGenreFilter(){
  const sel = document.getElementById('genreFilter');
  const cur = sel.value || 'all';
  const genres = new Set();
  catalog.forEach(it=>{
    if(it.genre){
      it.genre.split(',').map(g=>g.trim()).filter(Boolean).forEach(g=>genres.add(g));
    }
  });
  const sorted = Array.from(genres).sort((a,b)=>a.localeCompare(b,'ru'));
  sel.innerHTML = '<option value="all">Все жанры</option>' + sorted.map(g=>`<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
  if(sorted.includes(cur) || cur==='all') sel.value = cur;
}

    try{ localStorage.setItem('sinemateka_binid', CONFIG.jsonbinBinId); }catch(e){}

  if(binChanged){

  }else{
    await persist();

  }
});
